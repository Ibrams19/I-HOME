{% extends "base.html" %}

{% block title %}Logs - I-HOME{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="fw-bold mb-4">
        <i class="fas fa-terminal text-primary me-2"></i>Logs système
    </h2>
    
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-0 p-3">
            <div class="d-flex justify-content-between align-items-center">
                <span>Dernières 100 lignes</span>
                <a href="{{ url_for('view_logs') }}" class="btn btn-sm btn-outline-primary rounded-pill">
                    <i class="fas fa-sync-alt me-1"></i>Rafraîchir
                </a>
            </div>
        </div>
        <div class="card-body p-0">
            <pre class="bg-dark text-white p-3 m-0" style="border-radius: 0 0 20px 20px; overflow-x: auto; font-size: 12px;">{% for line in logs %}{{ line }}
{% endfor %}</pre>
        </div>
    </div>
</div>
{% endblock %}
