{% extends "base.html" %}

{% block title %}Erreur serveur - I-HOME{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-6">
            <div class="mb-4">
                <i class="fas fa-exclamation-triangle fa-5x text-warning"></i>
            </div>
            <h1 class="display-1 fw-bold text-warning">500</h1>
            <h2 class="fw-bold mb-3">Erreur serveur</h2>
            <p class="text-muted mb-4">
                Une erreur inattendue s'est produite. Notre équipe a été notifiée.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4">
                    <i class="fas fa-home me-2"></i>Accueil
                </a>
                <button onclick="location.reload()" class="btn btn-outline-primary rounded-pill px-4">
                    <i class="fas fa-sync-alt me-2"></i>Réessayer
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
