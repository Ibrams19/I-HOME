{% extends "base.html" %}

{% block title %}Page non trouvée - I-HOME{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-6">
            <div class="mb-4">
                <i class="fas fa-search fa-5x text-muted"></i>
            </div>
            <h1 class="display-1 fw-bold text-primary">404</h1>
            <h2 class="fw-bold mb-3">Page non trouvée</h2>
            <p class="text-muted mb-4">
                Oups ! La page que vous recherchez n'existe pas ou a été déplacée.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4">
                    <i class="fas fa-home me-2"></i>Accueil
                </a>
                <a href="{{ url_for('listings') }}" class="btn btn-outline-primary rounded-pill px-4">
                    <i class="fas fa-search me-2"></i>Voir les annonces
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
