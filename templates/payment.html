{% extends "base.html" %}

{% block title %}Paiement - I-HOME{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-md-5 text-center">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <i class="fas fa-credit-card fa-3x text-primary mb-3"></i>
                    <h2 class="fw-bold">Paiement de l'annonce</h2>
                    <p class="text-muted">Payez 1 000 FCFA pour publier votre annonce</p>
                    <div class="card bg-light mb-4"><div class="card-body"><h3 class="text-primary fw-bold">1 000 FCFA</h3><p class="mb-0">Frais de publication unique</p></div></div>
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3"><input type="tel" name="phone_number" class="form-control" placeholder="+221 78 123 45 67" required></div>
                        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-check-circle"></i> Payer maintenant</button>
                    </form>
                    <a href="{{ url_for('simulate_payment', listing_id=annonce.id) }}" class="btn btn-outline-success btn-sm mt-3"><i class="fas fa-flask"></i> Simuler le paiement (test)</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
