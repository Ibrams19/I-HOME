{% extends "base.html" %}

{% block title %}Inscription - I-HOME{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                        <h2 class="fw-bold">Inscription</h2>
                        <p class="text-muted">Créez votre compte gratuitement</p>
                    </div>
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nom d'utilisateur</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="fas fa-envelope me-1"></i>Email
                                <span class="text-danger">*</span>
                            </label>
                            <input type="email" name="email" class="form-control" placeholder="votre@email.com" required>
                            <small class="text-muted">Entrer votre Email</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mot de passe</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Je suis :</label>
                            <div class="form-check">
                                <input type="radio" name="user_type" id="type_tenant" value="tenant" class="form-check-input" checked>
                                <label class="form-check-label" for="type_tenant">
                                    <i class="fas fa-search"></i> Locataire / Acheteur
                                </label>
                            </div>
                            <div class="form-check">
                                <input type="radio" name="user_type" id="type_owner" value="owner" class="form-check-input">
                                <label class="form-check-label" for="type_owner">
                                    <i class="fas fa-home"></i> Propriétaire
                                </label>
                            </div>
                            <div class="form-check">
                                <input type="radio" name="user_type" id="type_broker" value="broker" class="form-check-input">
                                <label class="form-check-label" for="type_broker">
                                    <i class="fas fa-building"></i> Courtier / Agence
                                </label>
                            </div>
                        </div>
                        <div id="agency-field" style="display: none;" class="mb-3">
                            <label class="form-label fw-bold">Nom de l'agence</label>
                            <input type="text" name="agency_name" class="form-control" placeholder="Nom de votre agence">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill">
                            <i class="fas fa-user-plus me-1"></i> S'inscrire
                        </button>
                    </form>
                    <hr class="my-4">
                    <p class="text-center mb-0">Déjà inscrit ? <a href="{{ url_for('login') }}" class="text-primary fw-bold">Connectez-vous</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const radioOwner = document.getElementById('type_owner');
    const radioBroker = document.getElementById('type_broker');
    const agencyField = document.getElementById('agency-field');
    
    function toggleAgencyField() {
        agencyField.style.display = (radioBroker.checked) ? 'block' : 'none';
    }
    
    radioOwner.addEventListener('change', toggleAgencyField);
    radioBroker.addEventListener('change', toggleAgencyField);
</script>
<script>
    // Validation du mot de passe
    const passwordInput = document.querySelector('input[name="password"]');
    const passwordHelp = document.createElement('small');
    passwordHelp.className = 'text-muted mt-1 d-block';
    passwordHelp.innerHTML = '🔒 Le mot de passe doit contenir au moins 8 caractères, une lettre et un chiffre.';
    passwordInput.parentNode.appendChild(passwordHelp);
    
    // Ajouter un champ de confirmation
    const confirmDiv = document.createElement('div');
    confirmDiv.className = 'mb-3';
    confirmDiv.innerHTML = `
        <label class="form-label fw-bold">Confirmer le mot de passe</label>
        <input type="password" name="confirm_password" class="form-control" required>
    `;
    passwordInput.parentNode.parentNode.insertBefore(confirmDiv, passwordInput.parentNode.nextSibling);
    
    const confirmInput = document.querySelector('input[name="confirm_password"]');
    const errorDiv = document.createElement('div');
    errorDiv.className = 'text-danger small mt-1 d-none';
    errorDiv.id = 'password-error';
    confirmInput.parentNode.appendChild(errorDiv);
    
    function validatePassword() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        const hasMinLength = password.length >= 8;
        const hasLetter = /[a-zA-Z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        
        if (password && (hasMinLength && hasLetter && hasNumber)) {
            passwordHelp.className = 'text-success mt-1 d-block';
            passwordHelp.innerHTML = '✅ Mot de passe valide';
        } else {
            passwordHelp.className = 'text-danger mt-1 d-block';
            passwordHelp.innerHTML = '❌ Le mot de passe doit contenir au moins 8 caractères, une lettre et un chiffre.';
        }
        
        if (confirm && password !== confirm) {
            errorDiv.classList.remove('d-none');
            errorDiv.innerHTML = '❌ Les mots de passe ne correspondent pas';
            return false;
        } else {
            errorDiv.classList.add('d-none');
            return true;
        }
    }
    
    passwordInput.addEventListener('input', validatePassword);
    confirmInput.addEventListener('input', validatePassword);
    
    // Validation avant soumission
    document.querySelector('form').addEventListener('submit', function(e) {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        const hasMinLength = password.length >= 8;
        const hasLetter = /[a-zA-Z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        
        if (!hasMinLength || !hasLetter || !hasNumber) {
            e.preventDefault();
            alert("❌ Le mot de passe doit contenir au moins 8 caractères, une lettre et un chiffre.");
            return false;
        }
        
        if (password !== confirm) {
            e.preventDefault();
            alert("❌ Les mots de passe ne correspondent pas.");
            return false;
        }
    });
</script>  
{% endblock %}
