{% extends "base.html" %}

{% block title %}Paiement en cours - I-HOME{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4 text-center">
                <div class="card-body p-5">
                    <i class="fas fa-spinner fa-pulse fa-3x text-primary mb-3"></i>
                    <h3>Paiement en cours</h3>
                    <p class="text-muted">Vérifiez votre application Wave pour confirmer la transaction.</p>
                    <div class="alert alert-info"><i class="fas fa-clock"></i> ID : {{ payment_id }}</div>
                    <a href="{{ url_for('simulate_payment', listing_id=annonce.id) }}" class="btn btn-outline-success"><i class="fas fa-flask"></i> Simuler (test)</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    setInterval(function() {
        fetch('/payment/check/{{ annonce.id }}')
            .then(response => response.json())
            .then(data => { if(data.status === 'completed') window.location.href = '/listing/{{ annonce.id }}'; });
    }, 5000);
</script>
{% endblock %}
